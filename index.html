<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCADAS - Sabor del Caribe</title>
    <style>
        :root {
            --amarillo: #ffcd00;
            --azul: #003087;
            --rojo: #c8102e;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #fff8e1;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background: linear-gradient(45deg, var(--amarillo), var(--azul), var(--rojo));
            color: white;
            text-align: center;
            padding: 25px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .seccion-titulo {
            border-left: 5px solid var(--rojo);
            padding-left: 10px;
            margin: 20px 0;
            color: var(--azul);
        }

        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
        }

        /* Estilo multicolor para los productos */
        .producto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Colores caribeños alternados cada 2 líneas */
        .producto-item:nth-child(4n+1), .producto-item:nth-child(4n+2) { background: #ff6d00; } /* Naranja Caribe */
        .producto-item:nth-child(4n+3), .producto-item:nth-child(4n+4) { background: #2e7d32; } /* Verde Palmera */
        .producto-item:nth-child(odd) { filter: brightness(1.1); }

        .controles { display: flex; align-items: center; gap: 15px; }
        .btn-accion {
            background: rgba(255,255,255,0.3);
            color: white;
            border: 2px solid white;
            width: 35px; height: 35px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .total-box {
            background: #333;
            color: var(--amarillo);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .monto { font-size: 2rem; font-weight: bold; }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .geo-info {
            font-size: 0.7rem;
            color: #2e7d32;
            margin-top: 5px;
            font-style: italic;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: #777;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>COCADAS</h1>
    <p>Sabor de Palenque en Caucasia</p>
</header>

<div class="container">
    <h2 class="seccion-titulo">Tus Datos</h2>
    <div class="campo">
        <label>Nombre del Cliente</label>
        <input type="text" id="nombre">
    </div>
    <div class="campo">
        <label>Dirección de Entrega</label>
        <input type="text" id="direccion">
        <div id="geo-status" class="geo-info">📍 Ubicación lista para adjuntar</div>
    </div>
    <div class="campo">
        <label>Celular</label>
        <input type="tel" id="celular">
    </div>
    <div class="campo">
        <label>Observaciones</label>
        <textarea id="obs" rows="2"></textarea>
    </div>

    <input type="checkbox" id="sub_invisible" class="hidden" checked>

    <h2 class="seccion-titulo">Menú ($5.000 c/u)</h2>
    <div id="lista-dulces"></div>

    <div class="total-box">
        <h3>Total del Pedido</h3>
        <div class="monto">$<span id="txt-total">0</span></div>
    </div>

    <button class="btn-whatsapp" onclick="intentarEnvio()">
        Pedir por WhatsApp ➔
    </button>
</div>

<footer>
    <b>COCADAS - Caucasia</b><br>
    App desarrollada por <b>Vibras Positivas (3117700431)</b><br>
    © Todos los derechos reservados 2026
</footer>

<script>
    const MENU = [
        "Enyucados", "Cocadas Blancas", "Cocadas Cafés", "Dulce de Papaya",
        "Cocada de Piña", "Cocada de Arequipe", "Cocada de Guayaba", "Bolas de Tamarindo"
    ];
    
    const PRECIO_UNITARIO = 5000;
    let carrito = {};
    let userCoords = "No proporcionada";

    // Obtener geolocalización al cargar
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            userCoords = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            document.getElementById('geo-status').innerText = "✅ Ubicación GPS vinculada";
        });
    }

    function cargarMenu() {
        const divMenu = document.getElementById('lista-dulces');
        MENU.forEach(item => {
            carrito[item] = 0;
            const card = document.createElement('div');
            card.className = 'producto-item';
            card.innerHTML = `
                <div class="producto-nombre">${item}</div>
                <div class="controles">
                    <button class="btn-accion" onclick="modificar('${item}', -1)">-</button>
                    <span class="cantidad" id="cant-${item}">0</span>
                    <button class="btn-accion" onclick="modificar('${item}', 1)">+</button>
                </div>
            `;
            divMenu.appendChild(card);
        });
    }

    function modificar(item, cant) {
        if (carrito[item] + cant >= 0) {
            carrito[item] += cant;
            document.getElementById(`cant-${item}`).innerText = carrito[item];
            calcularTotal();
        }
    }

    function calcularTotal() {
        let total = 0;
        for (let item in carrito) total += carrito[item] * PRECIO_UNITARIO;
        document.getElementById('txt-total').innerText = total.toLocaleString('es-CO');
    }

    function intentarEnvio() {
        if (userCoords === "No proporcionada") {
            navigator.geolocation.getCurrentPosition(pos => {
                userCoords = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                generarPedido();
            }, () => {
                generarPedido(); // Si falla el GPS, envía igual sin mapa
            });
        } else {
            generarPedido();
        }
    }

    function generarPedido() {
        const cliente = document.getElementById('nombre').value;
        const dir = document.getElementById('direccion').value;
        const tel = document.getElementById('celular').value;
        const obs = document.getElementById('obs').value;

        if (!cliente || !dir) {
            alert("Completa los datos de entrega");
            return;
        }

        const ahora = new Date();
        const fechaCol = ahora.toLocaleString('es-CO', { timeZone: 'America/Bogota' });

        let factura = `*🧾 FACTURA DE PEDIDO - COCADAS*\n`;
        factura += `_Fecha: ${fechaCol}_\n`;
        factura += `------------------------------------------\n`;
        factura += `*CLIENTE:* ${cliente}\n`;
        factura += `*DIRECCIÓN:* ${dir}\n`;
        factura += `*GPS:* ${userCoords}\n`;
        factura += `*TEL:* ${tel}\n`;
        if(obs) factura += `*NOTAS:* ${obs}\n`;
        factura += `------------------------------------------\n`;
        factura += `*PRODUCTOS:*\n`;

        let totalFinal = 0;
        let tieneItems = false;

        for (let item in carrito) {
            if (carrito[item] > 0) {
                let sub = carrito[item] * PRECIO_UNITARIO;
                factura += `• ${item} (x${carrito[item]}) : $${sub.toLocaleString('es-CO')}\n`;
                totalFinal += sub;
                tieneItems = true;
            }
        }

        if (!tieneItems) { alert("Elige algún dulce"); return; }

        factura += `------------------------------------------\n`;
        factura += `*TOTAL A PAGAR: $${totalFinal.toLocaleString('es-CO')}*\n\n`;
        factura += `🚀 _App por Vibras Positivas (3117700431)_`;

        window.open(`https://wa.me/573117700431?text=${encodeURIComponent(factura)}`, '_blank');
    }

    cargarMenu();
</script>
</body>
</html>
