<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCADAS - Sabor del Caribe</title>
    <style>
        :root {
            --amarillo: #ffcd00;
            --azul: #003087;
            --rojo: #c8102e;
            --verde-palenque: #2e7d32;
            --naranja-vibrante: #ff6d00;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff8e1;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background: linear-gradient(45deg, var(--amarillo), var(--azul), var(--rojo));
            color: white;
            text-align: center;
            padding: 25px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        header p { margin: 5px 0 0; font-weight: 300; }

        .container {
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .seccion-titulo {
            border-left: 5px solid var(--rojo);
            padding-left: 10px;
            margin: 20px 0;
            color: var(--azul);
        }

        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .producto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            margin-bottom: 10px;
            border-radius: 12px;
            border-left: 4px solid var(--amarillo);
        }

        .producto-nombre { font-weight: 600; flex: 1; }

        .controles {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-accion {
            background: var(--azul);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .cantidad { font-weight: bold; min-width: 20px; text-align: center; }

        .total-box {
            background: #333;
            color: var(--amarillo);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .total-box h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; color: #fff; }
        .monto { font-size: 2rem; font-weight: bold; }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: #777;
            line-height: 1.5;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>COCADAS</h1>
    <p>Tradición y Dulzura de Palenque</p>
</header>

<div class="container">
    <h2 class="seccion-titulo">Tus Datos</h2>
    <div class="campo">
        <label>Nombre del Cliente</label>
        <input type="text" id="nombre" placeholder="Ej. Maria Perez">
    </div>
    <div class="campo">
        <label>Dirección de Entrega</label>
        <input type="text" id="direccion" placeholder="Calle, Carrera, Barrio">
    </div>
    <div class="campo">
        <label>Celular</label>
        <input type="tel" id="celular" placeholder="300 000 0000">
    </div>
    <div class="campo">
        <label>Observaciones</label>
        <textarea id="obs" rows="2" placeholder="Ej. Sin mucho dulce, dejar en portería..."></textarea>
    </div>

    <input type="checkbox" id="sub_invisible" class="hidden" checked>

    <h2 class="seccion-titulo">Menú ($5.000 c/u)</h2>
    <div id="lista-dulces"></div>

    <div class="total-box">
        <h3>Total del Pedido</h3>
        <div class="monto">$<span id="txt-total">0</span></div>
    </div>

    <button class="btn-whatsapp" onclick="generarPedido()">
        Pedir por WhatsApp ➔
    </button>
</div>

<footer>
    <b>COCADAS - Caucasia</b><br>
    App desarrollada por <b>Vibras Positivas (3117700431)</b><br>
    © Todos los derechos reservados 2026
</footer>

<script>
    const MENU = [
        "Enyucados", "Cocadas Blancas", "Cocadas Cafés", "Dulce de Papaya",
        "Cocada de Piña", "Cocada de Arequipe", "Cocada de Guayaba", "Bolas de Tamarindo"
    ];
    
    const PRECIO_UNITARIO = 5000;
    let carrito = {};

    function cargarMenu() {
        const divMenu = document.getElementById('lista-dulces');
        MENU.forEach(item => {
            carrito[item] = 0;
            const card = document.createElement('div');
            card.className = 'producto-item';
            card.innerHTML = `
                <div class="producto-nombre">${item}</div>
                <div class="controles">
                    <button class="btn-accion" onclick="modificar('${item}', -1)">-</button>
                    <span class="cantidad" id="cant-${item}">0</span>
                    <button class="btn-accion" onclick="modificar('${item}', 1)">+</button>
                </div>
            `;
            divMenu.appendChild(card);
        });
    }

    function modificar(item, cant) {
        if (carrito[item] + cant >= 0) {
            carrito[item] += cant;
            document.getElementById(`cant-${item}`).innerText = carrito[item];
            calcularTotal();
        }
    }

    function calcularTotal() {
        let total = 0;
        for (let item in carrito) {
            total += carrito[item] * PRECIO_UNITARIO;
        }
        document.getElementById('txt-total').innerText = total.toLocaleString('es-CO');
    }

    function generarPedido() {
        const cliente = document.getElementById('nombre').value;
        const dir = document.getElementById('direccion').value;
        const tel = document.getElementById('celular').value;
        const obs = document.getElementById('obs').value;
        const subscrito = document.getElementById('sub_invisible').checked;

        if (!cliente || !dir) {
            alert("Por favor completa Nombre y Dirección");
            return;
        }

        // Fecha y Hora de Colombia
        const ahora = new Date();
        const opciones = { timeZone: 'America/Bogota', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const fechaCol = ahora.toLocaleString('es-CO', opciones);

        let factura = `*🧾 FACTURA DE PEDIDO - COCADAS*\n`;
        factura += `_Fecha: ${fechaCol}_\n`;
        factura += `------------------------------------------\n`;
        factura += `*CLIENTE:* ${cliente}\n`;
        factura += `*DIRECCIÓN:* ${dir}\n`;
        factura += `*CELULAR:* ${tel}\n`;
        if(obs) factura += `*NOTAS:* ${obs}\n`;
        factura += `------------------------------------------\n`;
        factura += `*PRODUCTOS:*\n`;

        let totalFinal = 0;
        let tieneItems = false;

        for (let item in carrito) {
            if (carrito[item] > 0) {
                let subtotal = carrito[item] * PRECIO_UNITARIO;
                factura += `• ${item} (x${carrito[item]}) : $${subtotal.toLocaleString('es-CO')}\n`;
                totalFinal += subtotal;
                tieneItems = true;
            }
        }

        if (!tieneItems) {
            alert("¡Agrega al menos una cocada al carrito!");
            return;
        }

        factura += `------------------------------------------\n`;
        factura += `*TOTAL A PAGAR: $${totalFinal.toLocaleString('es-CO')}*\n\n`;
        factura += `🚀 _Pedido generado por App Vibras Positivas_`;

        const url = `https://wa.me/573117700431?text=${encodeURIComponent(factura)}`;
        window.open(url, '_blank');
    }

    cargarMenu();
</script>

</body>
</html>
